  # Forensics Identify (admin tool)
  # These settings control how the admin-only identify helper behaves, especially when using
  # URL-mode (HLS playlist) with optional auto-extend.
  media_gallery_forensics_identify_max_source_url_length:
    default: 10000
    type: integer
    min: 100
    max: 200000
    client: false

  # Optional residual source_url hardening for the admin forensic identify URL-mode.
  # Keep disabled on HTTP-only test sites; enable on production HTTPS sites.

  # When HTTPS-only source URLs are required, allow the canonical Discourse URL
  # to remain http:// for local/dev/test installs that have not enabled HTTPS yet.

  # Allows URL-mode to fetch and rewrite remote .m3u8 playlists that are not one of
  # the plugin's own /media/hls endpoints. Managed HLS localization is safer; keep this
  # off unless admins explicitly need direct S3/CDN playlist URL identify.
  media_gallery_forensics_http_source_url_policy:
    default: deny_all
    type: enum
    choices:

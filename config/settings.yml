plugins:
  media_gallery_enabled:
    default: true
    client: true

  # Viewing rules (members-only). Leave empty to allow all logged-in users.
  media_gallery_viewer_groups:
    default: ""
    type: list
    client: false

  # Upload rules
  media_gallery_allowed_uploader_groups:
    default: "trust_level_0"
    type: list
    client: false

  # View block rules. Members of these groups cannot view media gallery items.
  # A view block also prevents uploading, even if the user is in an uploader group.
  media_gallery_blocked_groups:
    default: ""
    type: list
    client: false

  # Upload-only block rules. Members of these groups cannot upload to the media gallery,
  # but they can still view media if they are allowed by the viewer rules.
  media_gallery_upload_blocked_groups:
    default: ""
    type: list
    client: false

  # Optional dedicated group used by the admin quick action "Block view & upload".
  # Members of this group are treated as view-blocked in addition to media_gallery_blocked_groups.
  media_gallery_quick_block_group:
    default: ""
    type: string
    client: false

  # Optional dedicated group used by the admin quick action "Block upload only".
  # Members of this group are treated as upload-blocked in addition to media_gallery_upload_blocked_groups.
  media_gallery_quick_upload_block_group:
    default: ""
    type: string
    client: false

  # Optional URL to an "Upload Terms" topic/page. Shown next to the required authorization checkbox.
  media_gallery_upload_terms_url:
    default: ""
    type: string
    client: true

  # Optional notice shown at the top of /media-library. Uses media_gallery_upload_terms_url for the guidelines link.
  media_gallery_library_notice_enabled:
    default: true
    client: true

  media_gallery_library_notice_title:
    default: "Use this media library responsibly."
    type: string
    client: true

  # Use {guidelines_link} where the media_gallery_upload_terms_url link should appear.
  media_gallery_library_notice_body:
    default: "Please review and follow the {guidelines_link}. Content may include visible or invisible watermarking."
    type: string
    client: true

  media_gallery_library_notice_link_text:
    default: "media guidelines"
    type: string
    client: true


  # Permission/access messages shown on /media-library. Plain text only.
  # Use {groups} in the restricted messages to show the configured viewer/uploader groups.
  media_gallery_view_restricted_title:
    default: "Media access is limited."
    type: string
    client: true

  media_gallery_view_restricted_message:
    default: "You can open this page, but media items are currently available only to: {groups}. Please contact staff if you need access."
    type: string
    client: true

  media_gallery_view_restricted_no_groups_message:
    default: "You can open this page, but media items are not available for your account. Please contact staff if you need access."
    type: string
    client: true

  media_gallery_upload_restricted_title:
    default: "Upload access is limited."
    type: string
    client: true

  media_gallery_upload_restricted_message:
    default: "Uploading to the media library is currently available only to: {groups}. Please contact staff if you need upload access."
    type: string
    client: true

  media_gallery_upload_restricted_no_groups_message:
    default: "Uploading to the media library is not available for your account. Please contact staff if you need upload access."
    type: string
    client: true

  media_gallery_blocked_view_title:
    default: "Media access has been restricted."
    type: string
    client: true

  media_gallery_blocked_view_message:
    default: "Your access to the media library has been restricted by staff. Please contact staff if you have questions or think this is a mistake."
    type: string
    client: true

  media_gallery_blocked_upload_title:
    default: "Upload access has been restricted."
    type: string
    client: true

  media_gallery_blocked_upload_message:
    default: "Your access to upload to the media library has been restricted by staff. Please contact staff if you have questions or think this is a mistake."
    type: string
    client: true

  # Optional extra size limit (MB) on top of Discourse's max_attachment_size_kb. 0 = disabled.
  media_gallery_max_upload_size_mb:
    default: 0
    client: false

  # Per-type size limits for registering media into the gallery (MB).
  # IMPORTANT: uploads.json is still governed by Discourse core limits + nginx upload_size.
  # These limits are enforced when calling POST /media (registration), not at the raw upload step.
  media_gallery_max_video_size_mb:
    default: 200
    client: false

  media_gallery_max_audio_size_mb:
    default: 50
    client: false

  media_gallery_max_image_size_mb:
    default: 20
    client: false

  media_gallery_max_tags_per_item:
    default: 10
    client: false

  media_gallery_allowed_tags:
    default: ""
    type: list
    client: true


  # Allowed extensions (no dots). These are additional restrictions on top of Discourse core upload rules.
  media_gallery_allowed_image_extensions:
    default: "jpg|jpeg|png|webp"
    type: list
    client: true

  media_gallery_allowed_video_extensions:
    default: "mp4|webm|mkv"
    type: list
    client: true

  media_gallery_allowed_audio_extensions:
    default: "mp3|m4a|ogg|wav"
    type: list
    client: true

  # Security hardening: if the actual media content cannot be recognized by ffprobe,
  # fail the media item before the full FFmpeg processing pipeline is attempted.
  media_gallery_fail_closed_on_unrecognized_media:
    default: true
    client: false

  # Exact duplicate upload handling for media gallery registration.
  # allow = permit duplicates, warn = ask users to confirm, block = prevent duplicates unless staff overrides.
  media_gallery_duplicate_upload_action:
    default: "allow"
    type: enum
    choices:
      - allow
      - warn
      - block
    client: false

  media_gallery_duplicate_upload_warning_message:
    default: "This exact file appears to match an existing media item. Please check whether a separate media item is really needed before continuing."
    type: string
    client: false

  media_gallery_duplicate_upload_block_message:
    default: "This exact file appears to match an existing media item, and duplicate media items are currently blocked."
    type: string
    client: false
  # Notify uploaders when asynchronous media processing is completed or fails.
  media_gallery_processing_notifications_enabled:
    default: true
    client: false

  # Transcoding / policy
  media_gallery_video_max_duration_seconds:
    default: 600
    client: false

  media_gallery_audio_max_duration_seconds:
    default: 900
    client: false

  media_gallery_video_target_bitrate_kbps:
    default: 5000
    client: false

  media_gallery_video_max_fps:
    default: 30
    client: false

  media_gallery_audio_bitrate_kbps:
    default: 128
    client: false

  media_gallery_delete_original_on_success:
    default: true
    client: false

  # Images: standardize output to JPG (requested). Turn off to match the original spec.
  media_gallery_transcode_images_to_jpg:
    default: true
    client: false

  # Visible watermarks (burned into video encodes).
  media_gallery_watermark_enabled:
    default: false
    client: false

  # If false, the watermark toggle is hidden and watermark is always applied on video uploads.
  media_gallery_watermark_user_can_toggle:
    default: true
    client: false

  # If true, users can choose a watermark option from the list below.
  media_gallery_watermark_user_can_choose_preset:
    default: true
    client: false

  # Watermark options (tags-like list). Example entries:
  #  - heartbeatpleasure.com
  #  - @{{username}}
  #  - heartbeatpleasure.com • @{{username}}
  # Default is the FIRST entry in this list.
  media_gallery_watermark_choices:
    default: ""
    type: list
    client: false

  # Global watermark position (applies to all options).
  media_gallery_watermark_position:
    default: "bottom_right"
    type: enum
    choices:
      - bottom_right
      - bottom_left
      - top_right
      - top_left
      - top_center
      - bottom_center
      - center
    client: false

  # Global watermark opacity (percentage). 100 = solid, 0 = invisible.
  media_gallery_watermark_opacity_percent:
    default: 35
    type: integer
    min: 1
    max: 100
    client: false

  # Global watermark size (% of the long side). Will be clamped so it always fits.
  # (Using the long side keeps the watermark visually consistent between landscape and portrait.)
  media_gallery_watermark_size_percent:
    default: 4.5
    type: float
    min: 0.5
    max: 30
    client: false

  # Global margin (px).
  media_gallery_watermark_margin_px:
    default: 24
    type: integer
    min: 0
    max: 200
    client: false

  # Default watermark text when watermark is enabled and no preset is selected (or available).
  media_gallery_watermark_default_text:
    default: "heartbeatpleasure.com"
    client: false




  # Lightweight frontend playback overlay (shown only inside /media-library preview, not burned into files).
  media_gallery_playback_overlay_video_enabled:
    default: false
    client: false

  media_gallery_playback_overlay_video_show_username:
    default: true
    client: false

  media_gallery_playback_overlay_video_show_timestamp:
    default: true
    client: false

  media_gallery_playback_overlay_video_show_session_code:
    default: true
    client: false

  media_gallery_playback_overlay_image_enabled:
    default: false
    client: false

  media_gallery_playback_overlay_image_show_username:
    default: true
    client: false

  media_gallery_playback_overlay_image_show_timestamp:
    default: true
    client: false

  media_gallery_playback_overlay_image_show_session_code:
    default: true
    client: false

  media_gallery_playback_overlay_positions:
    default: "top_left|top_center|top_right|center_left|center+40|center_right|bottom_left|bottom_center|bottom_right"
    type: list
    client: false

  media_gallery_playback_overlay_background_enabled:
    default: true
    client: false

  media_gallery_playback_overlay_background_opacity_percent:
    default: 45
    type: integer
    min: 0
    max: 100
    client: false

  media_gallery_playback_overlay_opacity_percent:
    default: 28
    type: integer
    min: 10
    max: 100
    client: false

  media_gallery_playback_overlay_font_size_px:
    default: 14
    type: integer
    min: 10
    max: 28
    client: false

  media_gallery_playback_overlay_move_interval_seconds:
    default: 18
    type: integer
    min: 0
    max: 300
    client: false

  media_gallery_playback_overlay_image_move_interval_seconds:
    default: 0
    type: integer
    min: 0
    max: 300
    client: false

  # Storage hardening (Option A): store processed media + thumbs outside /uploads.
  # When enabled, the plugin streams files from /shared via tokenized URLs only.
  media_gallery_private_storage_enabled:
    default: true
    client: false

  # Storage profile selection and shared processing settings.
  media_gallery_default_storage_profile_key:
    default: "local"
    type: enum
    choices:
      - local
      - s3_1
      - s3_2
      - s3_3
    client: false

  media_gallery_processing_root_path:
    default: "/shared/media_gallery/tmp"
    client: false

  # Safe cleanup for stale plugin-created processing/diagnostic temp directories.
  media_gallery_temp_cleanup_enabled:
    default: true
    client: false

  media_gallery_temp_cleanup_retention_hours:
    default: 24
    type: integer
    min: 1
    max: 720
    client: false

  media_gallery_delivery_mode_default:
    default: "stream"
    type: enum
    choices:
      - stream
      - x_accel
      - redirect
    client: false

  # Local storage profile.
  media_gallery_local_profile_name:
    default: "Local storage"
    client: false

  media_gallery_local_asset_root_path:
    default: "/shared/media_gallery/private"
    client: false

  # S3 profile 1.
  media_gallery_s3_profile_name:
    default: "S3 profile 1"
    client: false

  media_gallery_s3_endpoint:
    default: ""
    client: false

  media_gallery_s3_region:
    default: "auto"
    client: false

  media_gallery_s3_bucket:
    default: ""
    client: false

  media_gallery_s3_prefix:
    default: ""
    client: false

  media_gallery_s3_access_key_id:
    default: ""
    client: false

  media_gallery_s3_secret_access_key:
    default: ""
    client: false

  media_gallery_s3_force_path_style:
    default: false
    client: false

  media_gallery_s3_presign_ttl_seconds:
    default: 300
    type: integer
    min: 30
    max: 3600
    client: false

  ## Additional destination profiles

  # S3 profile 2.
  media_gallery_target_s3_profile_name:
    default: "S3 profile 2"
    client: false

  media_gallery_target_s3_endpoint:
    default: ""
    client: false

  media_gallery_target_s3_region:
    default: "auto"
    client: false

  media_gallery_target_s3_bucket:
    default: ""
    client: false

  media_gallery_target_s3_prefix:
    default: ""
    client: false

  media_gallery_target_s3_access_key_id:
    default: ""
    client: false

  media_gallery_target_s3_secret_access_key:
    default: ""
    client: false

  media_gallery_target_s3_force_path_style:
    default: false
    client: false

  media_gallery_target_s3_presign_ttl_seconds:
    default: 300
    type: integer
    min: 30
    max: 3600
    client: false

  # S3 profile 3.
  media_gallery_target_s3_2_profile_name:
    default: "S3 profile 3"
    client: false

  media_gallery_target_s3_2_endpoint:
    default: ""
    client: false

  media_gallery_target_s3_2_region:
    default: "auto"
    client: false

  media_gallery_target_s3_2_bucket:
    default: ""
    client: false

  media_gallery_target_s3_2_prefix:
    default: ""
    client: false

  media_gallery_target_s3_2_access_key_id:
    default: ""
    client: false

  media_gallery_target_s3_2_secret_access_key:
    default: ""
    client: false

  media_gallery_target_s3_2_force_path_style:
    default: false
    client: false

  media_gallery_target_s3_2_presign_ttl_seconds:
    default: 300
    type: integer
    min: 30
    max: 3600
    client: false

  # Processing hardening. Leave disabled to avoid Sidekiq retry-loops that can
  # repeatedly upload the same processed assets when a late-stage step fails.
  media_gallery_processing_raise_to_sidekiq_retry:
    default: false
    client: false


  # Base folder inside the container for private (processed) media. Must be writable by the discourse user.
  media_gallery_private_root_path:
    default: "/shared/media_gallery/private"
    client: false

  # Optional export location for originals (so a NAS can rsync-pull them). Originals are never served publicly.
  media_gallery_original_export_root_path:
    default: "/shared/media_gallery/original_export"
    client: false

  # Retention window for originals in HOURS. 0 = delete immediately after successful processing.
  media_gallery_original_retention_hours:
    default: 4
    client: false

  # Tokenized streaming
  media_gallery_stream_token_ttl_minutes:
    default: 15
    client: false

  # HLS (milestone 1)
  media_gallery_hls_enabled:
    default: false
    client: false

  # Download prevention: when enabled, ready video items that have HLS must play through HLS only.
  # This disables direct stream fallback/force_stream for videos, improving protection for
  # watermarked/fingerprinted HLS workflows at the cost of compatibility fallback.
  media_gallery_protected_video_hls_only:
    default: false
    client: false

  # Segment duration in seconds. Shorter = faster stop after revoke, more requests.
  media_gallery_hls_segment_duration_seconds:
    default: 6
    type: integer
    min: 2
    max: 10
    client: false

  # Optional: rate limit HLS endpoints (playlists/segments). 0 = disabled.
  # Defaults are intentionally generous: normal playback uses ~10 segments/min
  # at 6s segments, but seeks and browser retries can burst above that.
  media_gallery_hls_playlist_requests_per_token_per_minute:
    default: 120
    type: integer
    min: 0
    max: 20000
    client: false

  media_gallery_hls_segment_requests_per_token_per_minute:
    default: 720
    type: integer
    min: 0
    max: 20000
    client: false

  # Optional: separate AES-128 key endpoint rate limit. 0 = disabled.
  # Normal AES-HLS playback usually needs one key request per variant/load, but
  # retries, seeks and future key rotation can increase this, so keep generous.
  media_gallery_hls_key_requests_per_token_per_minute:
    default: 120
    type: integer
    min: 0
    max: 20000
    client: false

  # HLS AES-128 content hardening (iterative rollout).
  # This is not DRM: authorized clients still receive decryption keys for playback.
  # Keep disabled until the packaging pipeline, key storage and key endpoint iterations are complete.
  media_gallery_hls_aes128_enabled:
    default: false
    client: false

  # When enabled, playback requires an AES-128-ready HLS package
  # and direct stream fallback stays blocked for protected video.
  media_gallery_hls_aes128_required:
    default: false
    client: false

  # Future key rotation control. 0 = one AES key per video/package.
  # Non-zero values are reserved for a later implementation iteration.
  media_gallery_hls_aes128_key_rotation_segments:
    default: 0
    type: integer
    min: 0
    max: 1000
    client: false

  # Maximum number of media items an admin bulk AES backfill action may enqueue
  # in one request. Keep conservative; HLS repackaging can be CPU and storage intensive.
  media_gallery_hls_aes128_backfill_bulk_limit:
    default: 10
    type: integer
    min: 1
    max: 100
    client: false

  # Show detailed server-side performance timings on Media Gallery admin pages.
  # Keep disabled in normal production use; slow-search logging below still works separately.
  media_gallery_admin_pages_show_performance_timings:
    default: false
    client: false

  # Log slow Media Gallery management searches with phase timing. 0 disables slow-search logging.
  media_gallery_management_search_slow_log_ms:
    default: 2000
    type: integer
    min: 0
    max: 60000
    client: false

  # Optional troubleshooting: log AES-128 key-request denials once the key endpoint exists.
  # Kept separate from generic HLS denials so QA can enable it without increasing all HLS noise.
  media_gallery_log_hls_aes128_key_denials:
    default: false
    client: false

  # Debugging / forensics: log token denials (invalid/revoked/mismatch) for HLS endpoints.
  # Can be noisy when tokens are revoked at end of playback. Keep off unless needed.
  media_gallery_log_hls_denials:
    default: false
    client: false

  # Block copied media URLs opened directly in a browser tab/window.
  # Uses Fetch Metadata headers to block clear top-level navigation requests to
  # tokenized play/stream/HLS endpoints while allowing normal player/media requests.
  media_gallery_block_direct_media_navigation:
    default: true
    client: false

  # Stream scraping/anomaly controls for /media/stream.
  # Hard limits default to 0 (disabled) to avoid breaking legitimate browser range behavior.
  # Soft anomaly logging is enabled by default and records warning events when thresholds are exceeded.
  media_gallery_log_stream_anomalies:
    default: true
    client: false

  media_gallery_stream_requests_per_token_per_minute:
    default: 0
    type: integer
    min: 0
    max: 20000
    client: false

  media_gallery_stream_range_requests_per_token_per_minute:
    default: 0
    type: integer
    min: 0
    max: 20000
    client: false

  media_gallery_stream_anomaly_requests_per_token_per_minute:
    default: 180
    type: integer
    min: 0
    max: 20000
    client: false

  media_gallery_stream_anomaly_range_requests_per_token_per_minute:
    default: 90
    type: integer
    min: 0
    max: 20000
    client: false

  # Offload HLS segments via Nginx (X-Accel-Redirect). Playlists are still generated by Rails.
  media_gallery_hls_x_accel_enabled:
    default: false
    client: false

  # Internal Nginx location that maps to media_gallery_private_root_path.
  media_gallery_hls_x_accel_internal_location:
    default: "/internal/media-hls/"
    client: false

  # HLS performance tuning for managed/local storage. These are server-side only
  # and do not bypass token, session or rate-limit checks.
  # 0 disables this readiness cache. Caches only positive managed HLS readiness checks.
  media_gallery_hls_managed_readiness_cache_seconds:
    default: 30
    type: integer
    min: 0
    max: 300
    client: false

  # 0 disables raw playlist caching. Cache contains only raw master/index playlists,
  # never tokenized playlist responses and never presigned URLs.
  media_gallery_hls_playlist_cache_seconds:
    default: 15
    type: integer
    min: 0
    max: 300
    client: false

  # HLS-specific S3/R2/B2 presigned URL TTL for redirect delivery. 0 = use the
  # storage profile TTL. Keep short for protected content.
  media_gallery_hls_s3_presign_ttl_seconds:
    default: 60
    type: integer
    min: 0
    max: 3600
    client: false

  # 0 disables presigned segment URL caching. This cache is used only after all
  # token/session/rate-limit checks pass, and is capped below the presign TTL.
  media_gallery_hls_s3_presign_cache_seconds:
    default: 15
    type: integer
    min: 0
    max: 300
    client: false

  # In proxy/stream delivery, stream remote HLS segments through Rails instead of
  # buffering the whole S3 object before responding. Security checks remain unchanged.
  media_gallery_hls_proxy_stream_remote_segments:
    default: true
    client: false

  # HLS A/B fingerprinting (segment-level) - scaffold
  # When enabled, variant playlists are assembled per user token and point to /seg/.../(a|b)/... paths.
  # Note: A and B segments may still be identical until the transcoding pipeline generates real A/B media.
  media_gallery_fingerprint_enabled:
    default: false
    client: false

  # Optional secret to derive stable per-user fingerprint ids. Leave empty to use Rails secret_key_base.
  media_gallery_fingerprint_secret:
    default: ""
    type: string
    client: false

  # Watermark layout used when generating A/B HLS variants.
  # v8_microgrid is the hardened default for new packaging. Legacy layouts can
  # still be selected, but v1-v5 are auto-promoted to v8 for new uploads unless
  # legacy preservation is explicitly enabled below.
  media_gallery_fingerprint_watermark_layout:
    default: "v8_microgrid"
    type: enum
    choices:
      - v1_tiles
      - v2_pairs
      - v3_pairs
      - v4_pairs
      - v5_screen_safe
      - v6_local_sync
      - v7_high_separation
      - v8_microgrid
    client: false

  # If enabled, keep using configured legacy layouts (v1-v5) for new uploads.
  # Disabled by default so stale site settings do not keep packaging new uploads
  # with old forensic layouts. Existing packaged media remain unchanged.
  media_gallery_fingerprint_preserve_legacy_layouts_for_new_uploads:
    default: false
    client: false


  # Playback hardening (best-effort)


  # Early revocation lets the client invalidate a token when the overlay is closed.


  # Forensics retention / export (playback sessions)
  # Playback session logs can grow quickly and contain IP/User-Agent. Retain only as long as needed.
  # Set to 0 to disable automatic purging.
  media_gallery_forensics_playback_session_retention_days:
    default: 0
    type: integer
    min: 0
    max: 3650
    client: false

  # If enabled, a CSV export is generated before purging sessions.
  # By default it is stored as a gzipped file on the filesystem (see export root path setting).
  # Optional: also store gzipped CSV in the database (not recommended for large instances).
  # Export is admin-downloadable.
  media_gallery_forensics_export_enabled:
    default: false
    client: false

  # Where to store export files (gzipped). Leave blank to use:
  #   <media_gallery_original_export_root_path>/forensics_exports
  # If that is blank too, we fall back to:
  #   <media_gallery_private_root_path>/forensics_exports
  media_gallery_forensics_export_root_path:
    default: ""
    type: text
    client: false

  # If enabled, keep an additional private on-disk archive copy of each export.
  # Archive copies are subject to media_gallery_forensics_export_archive_retention_days.
  media_gallery_forensics_export_archive_enabled:
    default: true
    client: false

  # Optional: automatically delete archive copies older than N days. 0 = keep archives until manual deletion.
  # Default is 90 days after the export was created.
  media_gallery_forensics_export_archive_retention_days:
    default: 90
    type: integer
    min: 0
    max: 3650
    client: false

  # Where to store private archive copies. Leave blank to use:
  #   <media_gallery_private_root_path>/forensics_export_archive
  # Last resort fallback:
  #   /shared/media_gallery/private/forensics_export_archive
  media_gallery_forensics_export_archive_root_path:
    default: ""
    type: text
    client: false

  # Store exports in the database as well (gzipped). Not recommended: this can grow the DB quickly.
  media_gallery_forensics_export_store_in_db:
    default: false
    client: false

  # Optional: automatically delete stored exports older than N days. 0 = keep forever.
  media_gallery_forensics_export_retention_days:
    default: 0
    type: integer
    min: 0
    max: 3650
    client: false


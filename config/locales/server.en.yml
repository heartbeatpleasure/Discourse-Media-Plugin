    media_gallery_forensics_export_max_keep_title: "Maximum forensics exports to keep"
    media_gallery_forensics_export_retention_days: "Number of days that generated export records/files remain available before cleanup. Set to 0 only if you intentionally want no automatic purge."
    media_gallery_forensics_export_retention_days_title: "Forensics export retention days"
    media_gallery_forensics_export_root_path: "Filesystem path where generated forensics exports are stored before download or cleanup. Keep this path private and included/excluded from backups according to your policy."
    media_gallery_forensics_export_root_path_title: "Forensics export root path"
    media_gallery_forensics_export_store_in_db: "Stores export records in the database so admins can list, download, delete, and clean up exports from the admin UI."
    media_gallery_forensics_export_store_in_db_title: "Store forensics export metadata in database"
    media_gallery_forensics_http_source_url_policy: "Controls whether admin forensic identify may use http:// source URLs. allow_all permits HTTP anywhere; canonical_only permits HTTP only for this Discourse site's canonical host; deny_all blocks HTTP and allows only HTTPS."

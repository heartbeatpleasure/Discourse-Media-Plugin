    media_gallery_forensics_identify_policy_min_usable_strong_title: "Forensic strong match minimum usable samples"
    media_gallery_forensics_playback_session_retention_days: "Number of days to keep forensic playback session records. These records can include IP/user-agent/session signals, so choose a real retention period that matches your privacy policy."
    media_gallery_forensics_playback_session_retention_days_title: "Playback-session retention days"

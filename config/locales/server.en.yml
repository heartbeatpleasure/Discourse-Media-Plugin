    media_gallery_allowed_tags: "Optional controlled list of tags users may choose from. Leave empty to allow free-text tags. Use a pipe-separated list such as training|demo|archive."
    media_gallery_allowed_tags_title: "Allowed media tags"
    media_gallery_allowed_uploader_groups: "Groups that may upload new media items. Users also need view access. Use group names or trust-level groups such as trust_level_0."
    media_gallery_allowed_uploader_groups_title: "Groups allowed to upload media"
    media_gallery_allowed_video_extensions: "Video file extensions accepted by the Media Gallery registration flow. Actual content is also checked during processing where possible."
    media_gallery_allowed_video_extensions_title: "Allowed video extensions"

    media_gallery_forensics_http_source_url_policy_canonical_only: "Allow HTTP only for this Discourse host"
    media_gallery_forensics_http_source_url_policy_deny_all: "Deny all HTTP source URLs"
    media_gallery_forensics_http_source_url_policy_title: "Forensic identify HTTP source URL policy"
    media_gallery_forensics_identify_auto_extend_min_delta_percent: "Minimum gap between the best and next-best candidate during auto-extension. Higher values require clearer separation before accepting confidence."
    media_gallery_forensics_identify_auto_extend_min_delta_percent_title: "Forensic auto-extend minimum delta percent"
    media_gallery_forensics_identify_auto_extend_min_match_percent: "Minimum match percentage needed before auto-extension can treat a result as promising. Higher values reduce false positives but may require better samples."
    media_gallery_forensics_identify_auto_extend_min_match_percent_title: "Forensic auto-extend minimum match percent"
    media_gallery_forensics_identify_auto_extend_min_usable_samples: "Minimum usable fingerprint samples required before the tool considers auto-extension decisions reliable."
    media_gallery_forensics_identify_auto_extend_min_usable_samples_title: "Forensic auto-extend minimum usable samples"
    media_gallery_forensics_identify_filemode_engine_time_budget_seconds: "Harder engine-level time budget in seconds for file-mode matching. Increase only if valid samples need more analysis time."
    media_gallery_forensics_identify_filemode_engine_time_budget_seconds_title: "Forensic file-mode engine time budget"
    media_gallery_forensics_identify_filemode_soft_time_budget_seconds: "Soft processing time budget in seconds for forensic identify when using uploaded leak files. Exceeding it may reduce work or stop early rather than tying up workers."
    media_gallery_forensics_identify_filemode_soft_time_budget_seconds_title: "Forensic file-mode soft time budget"
    media_gallery_forensics_identify_max_auto_extend_samples: "Maximum number of extra sample windows the identify tool may try when the first URL-mode match is weak or ambiguous."
    media_gallery_forensics_identify_max_auto_extend_samples_title: "Forensic auto-extend maximum samples"
    media_gallery_forensics_identify_max_source_url_length: "Maximum accepted length for admin-supplied forensic identify source URLs. This protects logs/UI and avoids unexpectedly large URL inputs."
    media_gallery_forensics_identify_max_source_url_length_title: "Forensic identify source URL maximum length"
    media_gallery_forensics_identify_max_url_sample_seconds: "Maximum media duration sampled from a source URL during forensic identify. Longer samples improve confidence but increase processing time and temporary file size."
    media_gallery_forensics_identify_max_url_sample_seconds_title: "Forensic URL-mode maximum sample seconds"
    media_gallery_forensics_identify_policy_max_mismatch_rate_strong_percent: "Maximum mismatch percentage allowed for a result to remain classified as strong."
    media_gallery_forensics_identify_policy_max_mismatch_rate_strong_percent_title: "Forensic strong match maximum mismatch rate"
    media_gallery_forensics_identify_policy_min_delta_likely_percent: "Minimum separation between the best and second-best candidate required for a likely forensic result."
    media_gallery_forensics_identify_policy_min_delta_likely_percent_title: "Forensic likely match minimum delta percent"
    media_gallery_forensics_identify_policy_min_delta_strong_percent: "Minimum separation between the best and second-best candidate required for a strong forensic result."
    media_gallery_forensics_identify_policy_min_delta_strong_percent_title: "Forensic strong match minimum delta percent"
    media_gallery_forensics_identify_policy_min_match_likely_percent: "Minimum match percentage required for a likely forensic result."
    media_gallery_forensics_identify_policy_min_match_likely_percent_title: "Forensic likely match minimum percent"
    media_gallery_forensics_identify_policy_min_match_strong_percent: "Minimum match percentage required for a strong forensic result."
    media_gallery_forensics_identify_policy_min_match_strong_percent_title: "Forensic strong match minimum percent"
    media_gallery_forensics_identify_policy_min_usable_any: "Minimum usable samples required before forensic identify will report any meaningful candidate. Too low increases noise; too high rejects short samples."
    media_gallery_forensics_identify_policy_min_usable_any_title: "Forensic policy minimum usable samples"

    media_gallery_hls_x_accel_internal_location_title: "HLS X-Accel internal location"
    media_gallery_log_hls_denials: "Logs denied HLS playlist/segment requests for security analysis. Useful for troubleshooting and abuse detection, but may increase log volume."
    media_gallery_log_hls_denials_title: "Log denied HLS requests"
    media_gallery_log_stream_anomalies: "Logs suspicious /media/stream patterns such as many requests or range requests per token. This is detection only unless hard stream limits are also configured."
    media_gallery_log_stream_anomalies_title: "Log stream scraping anomalies"
    media_gallery_max_active_tokens_per_ip: "Maximum active playback tokens from one IP. Use cautiously because many legitimate users can share an IP."
    media_gallery_max_active_tokens_per_ip_title: "Max active playback tokens per IP"
    media_gallery_max_active_tokens_per_user: "Maximum number of active playback tokens a user may hold. Helps limit token churn and scraping. Too low may affect normal multi-tab usage."
    media_gallery_max_active_tokens_per_user_title: "Max active playback tokens per user"
    media_gallery_max_audio_size_mb: "Maximum audio file size in megabytes. Set to 0 to fall back to the general Media Gallery maximum upload size."
    media_gallery_max_audio_size_mb_title: "Maximum audio upload size"
    media_gallery_max_concurrent_sessions_per_ip: "Maximum active playback sessions allowed from one IP address. Use cautiously: shared offices, schools, VPNs, and mobile networks may share an IP."
    media_gallery_max_concurrent_sessions_per_ip_title: "Max concurrent playback sessions per IP"
    media_gallery_max_concurrent_sessions_per_user: "Maximum active playback sessions a single user may have at once. Lower values reduce sharing/abuse but may affect users with multiple tabs or devices."
    media_gallery_max_concurrent_sessions_per_user_title: "Max concurrent playback sessions per user"
    media_gallery_max_image_size_mb: "Maximum image file size in megabytes. Set to 0 to fall back to the general Media Gallery maximum upload size."
    media_gallery_max_image_size_mb_title: "Maximum image upload size"
    media_gallery_max_tags_per_item: "Maximum number of tags a user may assign to one media item. This keeps filtering manageable and prevents very long tag lists."
    media_gallery_max_tags_per_item_title: "Maximum tags per media item"
    media_gallery_max_upload_size_mb: "Plugin-level maximum file size in megabytes for all media uploads. Discourse and web server limits still apply first, so this cannot exceed your platform upload limits."
    media_gallery_max_upload_size_mb_title: "Maximum upload size"
    media_gallery_max_video_size_mb: "Maximum video file size in megabytes. Set to 0 to fall back to the general Media Gallery maximum upload size."
    media_gallery_max_video_size_mb_title: "Maximum video upload size"
    media_gallery_no_store_thumbnails: "When enabled, thumbnail responses use no-store/no-cache headers. This improves privacy and reduces thumbnail URL reuse, but can increase server/S3 traffic and make gallery browsing slightly less cache-friendly."
    media_gallery_no_store_thumbnails_title: "No-store thumbnail responses"
    media_gallery_original_export_root_path: "Filesystem path used when originals are exported before deletion. Treat this location as sensitive because it may contain original user uploads."
    media_gallery_original_export_root_path_title: "Original export root path"
    media_gallery_original_retention_hours: "How long exported originals should be retained before cleanup. Set to 0 to disable retention of exported originals. Choose a value that matches your privacy and backup policy."
    media_gallery_original_retention_hours_title: "Original export retention hours"
    media_gallery_play_tokens_per_ip_per_minute: "Optional rate limit for play-token creation per IP address. Helps reduce automated scraping attempts. Set to 0 to disable."
    media_gallery_play_tokens_per_ip_per_minute_title: "Play-token requests per IP per minute"
    media_gallery_private_root_path: "Filesystem path used for private local managed media files. Keep this outside publicly served web paths and ensure the Discourse process can read and write it."
    media_gallery_private_root_path_title: "Private local storage root path"
    media_gallery_private_storage_enabled: "Stores processed media and thumbnails in the configured private storage layer instead of relying only on public Discourse uploads. Recommended for protected media."
    media_gallery_private_storage_enabled_title: "Use private managed storage"
    media_gallery_processing_raise_to_sidekiq_retry: "When enabled, processing exceptions are re-raised so Sidekiq can apply its retry policy. When disabled, the media item is marked failed without Sidekiq retrying the job."
    media_gallery_processing_raise_to_sidekiq_retry_title: "Let Sidekiq retry processing failures"
    media_gallery_revoke_enabled: "Allows playback tokens/sessions to be revoked when users leave playback, lose access, or heartbeat checks fail. Recommended for protected media."
    media_gallery_revoke_enabled_title: "Enable playback token revocation"
    media_gallery_stream_anomaly_range_requests_per_token_per_minute: "Soft threshold for logging unusually many range requests per token per minute. This helps identify scraping while avoiding immediate blocking."
    media_gallery_stream_anomaly_range_requests_per_token_per_minute_title: "Stream range request anomaly threshold"
    media_gallery_stream_anomaly_requests_per_token_per_minute: "Soft threshold for logging suspicious request volume per token per minute. This does not block playback; it records an anomaly event for review."
    media_gallery_stream_anomaly_requests_per_token_per_minute_title: "Stream request anomaly threshold"
    media_gallery_stream_range_requests_per_token_per_minute: "Optional hard limit for HTTP Range requests to /media/stream per token per minute. 0 disables blocking. Set carefully because media players legitimately use range requests."
    media_gallery_stream_range_requests_per_token_per_minute_title: "Hard stream range request limit per token"
    media_gallery_stream_requests_per_token_per_minute: "Optional hard limit for /media/stream requests per playback token per minute. 0 disables blocking. Enable only after observing normal traffic to avoid false positives."
    media_gallery_stream_requests_per_token_per_minute_title: "Hard stream request limit per token"
    media_gallery_stream_token_ttl_minutes: "How long a playback/stream token remains valid. Shorter values reduce replay risk; longer values are more tolerant of slow clients or long viewing sessions."
    media_gallery_stream_token_ttl_minutes_title: "Stream token lifetime"
    media_gallery_thumbnail_cache_max_age_seconds: "How long stable thumbnail responses may be stored in a private browser cache. 0 forces revalidation. This is ignored when no-store thumbnails are enabled."
    media_gallery_thumbnail_cache_max_age_seconds_title: "Thumbnail cache max age seconds"
    media_gallery_transcode_images_to_jpg: "When enabled, uploaded images are standardized to JPG during processing. This can reduce format complexity and normalize output, but transparent images lose transparency."
    media_gallery_transcode_images_to_jpg_title: "Transcode uploaded images to JPG"
    media_gallery_upload_terms_url: "Optional link to your upload rules, terms, or guidelines. If set, the upload form can show this link next to the required uploader confirmation."
    media_gallery_upload_terms_url_title: "Upload terms URL"
    media_gallery_video_max_duration_seconds: "Maximum allowed video length in seconds. Set to 0 to disable the duration limit. The duration is checked with ffprobe when the local upload is available."
    media_gallery_video_max_duration_seconds_title: "Maximum video duration"
    media_gallery_video_max_fps: "Maximum output frame rate for transcoded videos. Lower values reduce file size and CPU cost. Common values are 25 or 30."
    media_gallery_video_max_fps_title: "Video maximum frame rate"
    media_gallery_video_target_bitrate_kbps: "Target video bitrate in kbps used during video transcoding. Higher values improve quality but increase file size and bandwidth. The processing code may reduce this for smaller source videos."
    media_gallery_video_target_bitrate_kbps_title: "Video target bitrate"
    media_gallery_viewer_groups: "Groups that may open the media library and view media. Leave empty only if media viewing should follow the plugin's default/public access behavior. This does not grant upload rights."
    media_gallery_viewer_groups_title: "Groups allowed to view the media library"
    media_gallery_watermark_choices: "Optional list of watermark presets offered to users. Keep this list small and descriptive so non-technical users understand what they are choosing."
    media_gallery_watermark_choices_title: "Watermark preset choices"
    media_gallery_watermark_default_text: "Fallback text used when a watermark template does not provide a user-specific value. Avoid sensitive secrets; this may be visible in processed media."
    media_gallery_watermark_default_text_title: "Default watermark text"
    media_gallery_watermark_enabled: "Adds a visible watermark during media processing when watermarking applies. This is deterrence and attribution, not DRM; it does not make downloads impossible."
    media_gallery_watermark_enabled_title: "Enable visible watermarking"
    media_gallery_watermark_margin_px: "Distance in pixels between the watermark and the nearest edge when the chosen position is near an edge."
    media_gallery_watermark_margin_px_title: "Watermark margin"
    media_gallery_watermark_opacity_percent: "Opacity percentage for the visible watermark. Lower values are less intrusive; higher values are harder to remove or ignore."
    media_gallery_watermark_opacity_percent_title: "Watermark opacity"
    media_gallery_watermark_position: "Default position for the visible watermark. Options include corners, top/bottom center, or center. Choose a position that remains readable without covering important content."
    media_gallery_watermark_position_bottom_center: "Bottom center"
    media_gallery_watermark_position_bottom_left: "Bottom left"
    media_gallery_watermark_position_bottom_right: "Bottom right"
    media_gallery_watermark_position_center: "Center"
    media_gallery_watermark_position_title: "Watermark position"
    media_gallery_watermark_position_top_center: "Top center"
    media_gallery_watermark_position_top_left: "Top left"
    media_gallery_watermark_position_top_right: "Top right"
    media_gallery_watermark_size_percent: "Approximate watermark size as a percentage of the media dimensions. Increase for stronger deterrence; decrease for less visual impact."
    media_gallery_watermark_size_percent_title: "Watermark size"
    media_gallery_watermark_user_can_choose_preset: "Allows users to pick from configured watermark presets. Disable this if admins should fully control watermark placement and style."
    media_gallery_watermark_user_can_choose_preset_title: "Users may choose watermark preset"
    media_gallery_watermark_user_can_toggle: "Allows uploaders/viewers to turn off the visible watermark where the UI offers that choice. For protected content this is usually best disabled."
    media_gallery_watermark_user_can_toggle_title: "Users may disable visible watermark"

    # Restored Media Gallery security/forensics setting descriptions.
    media_gallery_forensics_export_archive_enabled: "Keep an additional private on-disk archive copy of each generated forensics export. Useful for backups and audit retention. Archive files are sensitive and should remain outside public web paths."
    media_gallery_forensics_export_archive_enabled_title: "Media gallery forensics export archive copy"
    media_gallery_forensics_export_archive_retention_days: "Number of days to keep private archive copies of forensics exports. Default is 90 days. Set to 0 only if you intentionally want archive copies kept until manual deletion."
    media_gallery_forensics_export_archive_retention_days_title: "Media gallery forensics export archive retention days"
    media_gallery_forensics_export_archive_root_path: "Private filesystem path for archived forensics export copies. Leave blank to use the Media Gallery private root under forensics_export_archive, with /shared/media_gallery/private/forensics_export_archive as a final fallback."
    media_gallery_forensics_export_archive_root_path_title: "Media gallery forensics export archive root path"
    media_gallery_protected_video_hls_only: "When enabled, ready video items that have HLS must play through HLS and the direct stream fallback is blocked. This strengthens download deterrence for protected/watermarked/fingerprinted video, but can reduce compatibility for clients that cannot play HLS."
    media_gallery_protected_video_hls_only_title: "Media gallery HLS-only video mode"
    media_gallery_block_direct_media_navigation_title: "Media gallery block direct media navigation"
    media_gallery_block_direct_media_navigation: "When enabled, tokenized play/stream/HLS endpoints reject clear browser address-bar/new-tab requests, including direct .m3u8 or .ts opens that do not originate from the site player context. Normal same-origin player requests continue to work. This only applies while requests pass through Discourse; final S3/R2 presigned redirect URLs cannot be controlled after the redirect."

    # Media Gallery iteration 2 setting/help text.
    media_gallery_temp_cleanup_enabled_title: "Media Gallery temp workspace cleanup"
    media_gallery_temp_cleanup_enabled: "Automatically remove old plugin-created temporary processing, verification and forensic workspace folders. Only known Media Gallery temp directory prefixes are considered."
    media_gallery_temp_cleanup_retention_hours_title: "Media Gallery temp cleanup retention hours"
    media_gallery_temp_cleanup_retention_hours: "How old a plugin-created temp/workspace directory must be before cleanup may remove it. Default 24 hours."

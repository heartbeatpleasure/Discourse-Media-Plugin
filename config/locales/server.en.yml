    media_gallery_audio_bitrate_kbps_title: "Audio bitrate"
    media_gallery_audio_max_duration_seconds: "Maximum allowed audio length in seconds. Set to 0 to disable the duration limit. The duration is checked with ffprobe when the local upload is available."
    media_gallery_audio_max_duration_seconds_title: "Maximum audio duration"
    media_gallery_bind_stream_to_ip: "When enabled, playback tokens are valid only from the issuing IP address. Stronger against token sharing, but can break users whose IP changes during playback."
    media_gallery_bind_stream_to_ip_title: "Bind stream tokens to IP address"
    media_gallery_bind_stream_to_session: "When enabled, playback tokens are tied to the signed Media Gallery session-binding cookie. Recommended where supported."
    media_gallery_bind_stream_to_session_title: "Bind stream tokens to browser session"
    media_gallery_bind_stream_to_user: "When enabled, playback tokens are valid only for the user they were issued to. Recommended for protected media."
    media_gallery_bind_stream_to_user_title: "Bind stream tokens to user"
    media_gallery_delete_original_on_success: "When enabled, the original uploaded file is removed after processed outputs are safely stored. This saves disk space but means admins rely on the processed/exported copy, not the original upload."
    media_gallery_delete_original_on_success_title: "Delete original upload after successful processing"
    media_gallery_enabled: "Turns the Media Gallery plugin on or off. When disabled, Media Gallery pages and endpoints are unavailable even if the plugin is installed."
    media_gallery_enabled_title: "Enable Media Gallery"
    media_gallery_fail_closed_on_unrecognized_media: "When enabled, newly uploaded files that ffprobe cannot recognize as image, audio, or video fail before the full FFmpeg processing pipeline. This helps reject renamed PDFs, HTML, ZIPs, or random bytes early. Disable only as a temporary compatibility fallback for unusual but valid media."

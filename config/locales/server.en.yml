    media_gallery_ffmpeg_path: "Command or absolute path used to run FFmpeg. Use the system default unless you intentionally manage a specific FFmpeg binary."
    media_gallery_ffmpeg_path_title: "FFmpeg executable path"
    media_gallery_ffprobe_path: "Command or absolute path used to run FFprobe. Use the system default unless you intentionally manage a specific FFprobe binary."
    media_gallery_ffprobe_path_title: "FFprobe executable path"
    media_gallery_fingerprint_enabled: "Enables forensic A/B HLS segment fingerprinting for newly packaged videos. This helps identify which user/session likely received a leaked stream."
    media_gallery_fingerprint_enabled_title: "Enable HLS fingerprinting"
    media_gallery_fingerprint_secret: "Secret value used to derive per-user/per-session fingerprint choices. Keep it private and stable; changing it can affect future fingerprint attribution consistency."
    media_gallery_fingerprint_secret_title: "Fingerprint secret"
    media_gallery_forensics_allow_remote_hls_playlist_fetch: "Allows forensic identify to fetch and rewrite direct remote .m3u8 playlists. Leave disabled unless admins intentionally need direct remote playlist analysis; plugin-managed /media/hls URLs are safer."
    media_gallery_forensics_allow_remote_hls_playlist_fetch_title: "Allow remote HLS playlist fetch in forensic identify"
    media_gallery_forensics_export_enabled: "Allows admins to generate/download forensics export files. Treat exports as sensitive evidence because they may contain user/session/IP metadata."
    media_gallery_forensics_export_enabled_title: "Enable forensics exports"

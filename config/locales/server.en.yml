    media_gallery_hls_aes128_key_rotation_segments_title: "HLS AES-128 key rotation segments"
    media_gallery_hls_aes128_backfill_bulk_limit: "Maximum number of eligible videos a single admin bulk AES backfill request may enqueue. Keep conservative because repackaging uses FFmpeg and storage I/O."
    media_gallery_hls_aes128_backfill_bulk_limit_title: "HLS AES backfill bulk limit"
    media_gallery_log_hls_aes128_key_denials: "Logs denied AES-128 key requests separately from generic HLS denial troubleshooting. Useful during QA, but can add log volume."
    media_gallery_log_hls_aes128_key_denials_title: "Log denied HLS AES key requests"
